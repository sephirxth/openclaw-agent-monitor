<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luna Agent Monitor</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:#0b1020;color:#e5e7eb;margin:0;padding:24px}
    h1{margin:0 0 8px;font-size:28px}
    .muted{color:#94a3b8}
    .topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
    .refresh-panel{min-width:260px;max-width:420px;flex:1}
    .refresh-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#94a3b8;margin-bottom:8px}
    .refresh-bar{height:8px;border-radius:999px;background:#1f2937;overflow:hidden;border:1px solid #243042}
    .refresh-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#60a5fa,#a78bfa);transition:width .12s linear}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;margin-top:20px}
    .card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .active{background:#052e16;color:#86efac}.idle{background:#1e293b;color:#cbd5e1}.stale{background:#3f1d2e;color:#fda4af}.blocked{background:#3b2f05;color:#fde68a}.running{background:#0c4a6e;color:#7dd3fc}.done{background:#1d4ed8;color:#bfdbfe}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#cbd5e1}
    .section{margin-top:10px;font-size:14px;line-height:1.5}
    .focus-box{margin-top:12px;padding:12px;border-radius:14px;background:#0f172a;border:1px solid #1f2937}
    .focus-title{font-size:12px;color:#93c5fd;font-weight:700;margin-bottom:6px}
    .focus-main{font-size:15px;line-height:1.55;color:#e5e7eb}
    .focus-sub{margin-top:8px;font-size:13px;line-height:1.5;color:#94a3b8}
    details.advanced{margin-top:12px;border-top:1px solid #1f2937;padding-top:10px}
    details.advanced > summary{cursor:pointer;color:#93c5fd;font-weight:700;list-style:none}
    details.advanced > summary::-webkit-details-marker{display:none}
    .label{color:#93c5fd;font-weight:700}
    .token-box{margin-top:10px;padding:10px 12px;border-radius:12px;background:#0f172a;border:1px solid #1f2937;transition:box-shadow .35s ease,border-color .35s ease,transform .2s ease}
    .token-box.hot{box-shadow:0 0 0 1px rgba(125,211,252,.45),0 0 22px rgba(56,189,248,.18);border-color:#38bdf8;transform:translateY(-1px)}
    .token-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 12px;margin-top:8px}
    .activity-note{margin-top:8px;color:#94a3b8;line-height:1.45}
    .chart-box{margin-top:12px;padding-top:10px;border-top:1px solid #1f2937}
    .chart-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .range-switch{display:flex;gap:6px}
    .pulse-box{margin-top:12px;padding-top:10px;border-top:1px solid #1f2937}
    .pulse-strip{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:6px;align-items:end;height:72px;margin-top:10px;padding:8px;border:1px solid #1f2937;border-radius:12px;background:linear-gradient(180deg,#0b1220,#09111d)}
    .pulse-strip.active .pulse-bar.on{transform:translateY(-1px)}
    .pulse-bar{display:block;min-height:8px;border-radius:999px 999px 4px 4px;background:#1f2937;transition:height .22s ease,background-color .22s ease,box-shadow .22s ease,transform .22s ease,opacity .22s ease}
    .pulse-bar.on{background:linear-gradient(180deg,#7dd3fc,#38bdf8);box-shadow:0 0 16px rgba(56,189,248,.30)}
    .pulse-bar.dim{background:#243244}
    .pulse-bar.placeholder{opacity:.45}
    .usage-box{margin-top:12px;padding-top:10px;border-top:1px solid #1f2937}
    .usage-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 12px;margin-top:8px}
    .usage-list{margin:8px 0 0;padding-left:18px;color:#cbd5e1}
    .usage-list li{margin:4px 0}
    .range-btn{background:#111827;color:#94a3b8;border:1px solid #334155;border-radius:999px;padding:3px 9px;font-size:12px;cursor:pointer}
    .range-btn.active{background:#1d4ed8;color:#dbeafe;border-color:#2563eb}
    .spark{width:100%;height:150px;margin-top:10px;background:#0b1220;border-radius:12px;border:1px solid #1f2937;display:block}
    .live-state{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .live-state.state-active{background:#052e16;color:#86efac;box-shadow:0 0 16px rgba(34,197,94,.18)}
    .live-state.state-pending{background:#3b2f05;color:#fde68a}
    .live-state.state-stuck{background:#3f1d2e;color:#fda4af;box-shadow:0 0 16px rgba(244,114,182,.14)}
    .live-state.state-quiet{background:#1e293b;color:#cbd5e1}
    .chart-note{margin-top:6px;color:#94a3b8;line-height:1.45}
    .mono.bump{display:inline-block;animation:bump .45s ease}
    @keyframes bump{0%{transform:scale(1);color:#e5e7eb}35%{transform:scale(1.08);color:#7dd3fc}100%{transform:scale(1);color:#e5e7eb}}
    a{color:#93c5fd;text-decoration:none}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Multi-Agent 状态监控</h1>
      <div class="muted" id="meta">加载中…</div>
    </div>
    <div class="refresh-panel">
      <div class="refresh-head">
        <span>刷新频率：5 秒</span>
        <span id="countdown">下次刷新 5.0s</span>
      </div>
      <div class="refresh-bar"><div class="refresh-fill" id="refreshFill"></div></div>
    </div>
  </div>
  <div class="grid" id="grid"></div>
<script>
const REFRESH_MS = 5000;
const HISTORY_REFRESH_MS = 60000;
const cardMap = new Map();
let previous = new Map();
const liveSamples = new Map();
const clientSnapshots = new Map();
let historyData = {};
let usageSummaryData = {};
let usageSummaryMeta = {};
let selectedRange = '1h';
let lastLoadAt = performance.now();
function fmt(ms){if(!ms)return 'n/a';const d=new Date(ms);return d.toLocaleString('zh-CN',{hour12:false})}
function esc(s){return (s??'').toString().replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
function asText(v){return (v===undefined||v===null||v==='')?'n/a':String(v)}
async function loadHistory(){
  const res = await fetch(`/api/history?range=${selectedRange}`);
  const data = await res.json();
  historyData = data.series || {};
}
async function loadUsageSummary(){
  const res = await fetch('/api/usage-summary');
  const data = await res.json();
  usageSummaryData = data.agents || {};
  usageSummaryMeta = data || {};
}
function mergedPoints(agentId){
  return [...(historyData[agentId] || [])];
}
function rangeWindowMs(range){
  if(range === '1w') return 7 * 24 * 60 * 60 * 1000;
  if(range === '1d') return 24 * 60 * 60 * 1000;
  return 60 * 60 * 1000;
}
function fmtAxisNumber(v){
  const n = Math.round(Number(v || 0));
  if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(n % 1_000_000 ? 1 : 0)}M`;
  if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(n % 1_000 ? 1 : 0)}K`;
  return String(n);
}
function fmtAxisTime(ts, range){
  const d = new Date(ts);
  if (range === '1w') return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', hour12:false });
  if (range === '1d') return d.toLocaleString('zh-CN', { day:'2-digit', hour:'2-digit', hour12:false });
  return d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false });
}
function niceStep(span, targetTicks = 4){
  const raw = Math.max(1, span) / Math.max(1, targetTicks);
  const power = Math.pow(10, Math.floor(Math.log10(raw)));
  const scaled = raw / power;
  const mult = scaled <= 1 ? 1 : scaled <= 2 ? 2 : scaled <= 5 ? 5 : 10;
  return mult * power;
}
function drawChart(svgEl, points){
  if(!svgEl) return;
  const width = 320, height = 150;
  const margin = { top: 14, right: 12, bottom: 30, left: 48 };
  const plotW = width - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;
  const now = Date.now();
  const xMin = now - rangeWindowMs(selectedRange);
  const xMax = now;
  svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

  const safePoints = (points || []).filter(p => Number.isFinite(Number(p.delta_total)));
  const vals = safePoints.map(p => Number(p.delta_total || 0));
  const rawMin = vals.length ? Math.min(...vals) : 0;
  const rawMax = vals.length ? Math.max(...vals) : 0;
  const yStep = niceStep(Math.max(1, rawMax - rawMin || rawMax || 1), 4);
  let yMin = Math.max(0, Math.floor(rawMin / yStep) * yStep);
  let yMax = Math.ceil(Math.max(rawMax, yMin + 1) / yStep) * yStep;
  if (yMax <= yMin) yMax = yMin + yStep;
  const ySpan = Math.max(1, yMax - yMin);

  const xAt = (ts) => margin.left + ((ts - xMin) / Math.max(1, xMax - xMin)) * plotW;
  const yAt = (value) => margin.top + (1 - ((value - yMin) / ySpan)) * plotH;

  const yTicks = [];
  for (let v = yMin; v <= yMax + 0.0001; v += yStep) yTicks.push(v);
  const xTicks = [xMin, xMin + (xMax - xMin) / 2, xMax];

  const gridY = yTicks.map(v => {
    const y = yAt(v).toFixed(1);
    return `<g><line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#1e293b" stroke-width="1" />
      <text x="${margin.left - 8}" y="${Number(y) + 4}" text-anchor="end" fill="#94a3b8" font-size="10">${fmtAxisNumber(v)}</text></g>`;
  }).join('');
  const gridX = xTicks.map(ts => {
    const x = xAt(ts).toFixed(1);
    return `<g><line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="#172033" stroke-width="1" />
      <text x="${x}" y="${height - 10}" text-anchor="middle" fill="#94a3b8" font-size="10">${fmtAxisTime(ts, selectedRange)}</text></g>`;
  }).join('');

  let series = `<text x="${margin.left + 8}" y="${margin.top + 16}" fill="#64748b" font-size="12">暂无足够历史数据</text>`;
  if (safePoints.length >= 2) {
    const path = safePoints.map((p, i) => {
      const ts = Number(p.ts || xMin);
      const x = xAt(Math.min(xMax, Math.max(xMin, ts)));
      const y = yAt(Number(p.delta_total || 0));
      return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const last = safePoints[safePoints.length - 1];
    const lastX = xAt(Math.min(xMax, Math.max(xMin, Number(last.ts || xMin)))).toFixed(1);
    const lastY = yAt(Number(last.delta_total || 0)).toFixed(1);
    series = `
      <path d="${path}" fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"></path>
      <circle cx="${lastX}" cy="${lastY}" r="3.5" fill="#93c5fd" stroke="#0b1220" stroke-width="1.5"></circle>
      <text x="${width - margin.right}" y="${margin.top + 2}" text-anchor="end" fill="#94a3b8" font-size="10">当前窗口 ${fmtAxisNumber(last.delta_total || 0)}</text>
    `;
  }

  svgEl.innerHTML = `
    <rect x="0" y="0" width="${width}" height="${height}" rx="12" fill="#0b1220"></rect>
    ${gridY}
    ${gridX}
    <line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="#334155" stroke-width="1.2"></line>
    <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#334155" stroke-width="1.2"></line>
    ${series}
  `;
}
function rangeButtons(agentId){
  return ['1h','1d','1w'].map(r => `<button class="range-btn ${selectedRange===r?'active':''}" data-agent="${agentId}" data-range="${r}">${r}</button>`).join('');
}
function fmtNum(v){
  const n = Number(v || 0);
  return n.toLocaleString('zh-CN');
}
function signedNum(v){
  const n = Number(v || 0);
  if (n > 0) return `+${fmtNum(n)}`;
  if (n < 0) return `-${fmtNum(Math.abs(n))}`;
  return '0';
}
function fmtDuration(ms){
  if (!Number.isFinite(Number(ms))) return 'n/a';
  const seconds = Math.max(0, Math.round(Number(ms || 0) / 1000));
  if (!seconds) return '0s';
  if (seconds < 60) return `${seconds}s`;
  const minutes = Math.floor(seconds / 60);
  const remainSeconds = seconds % 60;
  if (minutes < 60) return remainSeconds ? `${minutes}m ${remainSeconds}s` : `${minutes}m`;
  const hours = Math.floor(minutes / 60);
  const remainMinutes = minutes % 60;
  return remainMinutes ? `${hours}h ${remainMinutes}m` : `${hours}h`;
}
function recordRealtimeSample(a){
  const aid = a.agent_id;
  const now = Date.now();
  const total = Number(a.tokens?.total || 0);
  const sessionKey = a.token_session_key || a.latest_session_key || null;
  const prev = clientSnapshots.get(aid);
  let delta = 0;
  if (prev && total > 0) {
    const sameSession = !!(prev.session_key && sessionKey && prev.session_key === sessionKey);
    if ((sameSession || !prev.session_key || !sessionKey) && total >= Number(prev.total || 0)) delta = total - Number(prev.total || 0);
    else delta = total;
  }
  const sample = { ts: now, total, delta: Math.max(0, delta), session_key: sessionKey };
  const samples = liveSamples.get(aid) || [];
  const last = samples[samples.length - 1];
  if (!last || last.total !== sample.total || last.session_key !== sample.session_key || now - last.ts >= REFRESH_MS - 250) {
    samples.push(sample);
  } else {
    samples[samples.length - 1] = sample;
  }
  const cutoff = now - 60 * 60 * 1000;
  while (samples.length && Number(samples[0].ts || 0) < cutoff) samples.shift();
  liveSamples.set(aid, samples);
  clientSnapshots.set(aid, { total, session_key: sessionKey, ts: now });
  return samples;
}
function realtimeFeedback(a){
  const now = Date.now();
  const samples = recordRealtimeSample(a);
  const recentSamples = samples.filter(s => now - Number(s.ts || 0) <= 60 * 1000);
  const last = recentSamples[recentSamples.length - 1] || samples[samples.length - 1] || { delta: 0, ts: now };
  const lastPositive = [...samples].reverse().find(s => Number(s.delta || 0) > 0);
  let streakStart = 0;
  for (let i = samples.length - 1; i >= 0; i -= 1) {
    if (Number(samples[i].delta || 0) <= 0) break;
    streakStart = Number(samples[i].ts || 0);
  }
  const streakMs = streakStart ? now - streakStart + REFRESH_MS : 0;
  const sum1m = recentSamples.reduce((sum, sample) => sum + Number(sample.delta || 0), 0);
  const sessionUpdatedAt = Number(a.tokens?.session_updated_at || a.latest_session?.updatedAt || a.last_updated_ms || 0);
  const sinceTouchMs = sessionUpdatedAt ? now - sessionUpdatedAt : Number.POSITIVE_INFINITY;
  const sinceGrowthMs = lastPositive ? now - Number(lastPositive.ts || now) : Number.POSITIVE_INFINITY;
  let stateKey = 'quiet';
  let label = '⚪ 静默';
  let detail = '最近没有 token 变化。';
  if (Number(last.delta || 0) > 0 || sinceGrowthMs <= 15 * 1000) {
    stateKey = 'active';
    label = '🟢 活跃';
    detail = `最近 15s 内有 token 增长，连续活跃 ${fmtDuration(streakMs)}。`;
  } else if ((a.status === 'running' || sinceTouchMs <= 60 * 1000) && sinceGrowthMs <= 90 * 1000) {
    stateKey = 'pending';
    label = '🟡 挂起';
    detail = '最近有会话触达，但这个 5 秒窗口没有新 token。';
  } else if ((a.status === 'running' || sinceTouchMs <= 5 * 60 * 1000) && sinceGrowthMs > 90 * 1000) {
    stateKey = 'stuck';
    label = '🔴 疑似卡死';
    detail = Number.isFinite(sinceGrowthMs) ? `已经 ${fmtDuration(sinceGrowthMs)} 没有 token 变化。` : '最近长时间没有看到 token 变化。';
  }
  return {
    samples,
    recentSamples,
    currentDelta: Math.max(0, Number(last.delta || 0)),
    sum1m,
    streakMs,
    sinceGrowthMs,
    stateKey,
    label,
    detail,
    isWorking: stateKey === 'active',
  };
}
function renderPulse(el, samples){
  if (!el) return;
  const now = Date.now();
  const recent = (samples || []).filter(sample => now - Number(sample.ts || 0) <= 60 * 1000).slice(-12);
  const padded = [];
  for (let i = 0; i < Math.max(0, 12 - recent.length); i += 1) {
    padded.push({ delta: 0, placeholder: true, ts: now - (12 - i) * REFRESH_MS });
  }
  padded.push(...recent);
  const bars = padded.slice(-12);
  const maxDelta = Math.max(1, ...bars.map(sample => Number(sample.delta || 0)));
  el.classList.toggle('active', bars.some(sample => Number(sample.delta || 0) > 0));
  el.innerHTML = bars.map(sample => {
    const delta = Math.max(0, Number(sample.delta || 0));
    const height = delta > 0 ? 12 + Math.round((delta / maxDelta) * 44) : 8;
    const klass = sample.placeholder ? 'pulse-bar placeholder' : delta > 0 ? 'pulse-bar on' : 'pulse-bar dim';
    const title = sample.placeholder ? '等待实时样本' : `${fmtAxisTime(Number(sample.ts || now), '1h')} · ${signedNum(delta)}`;
    return `<span class="${klass}" style="height:${height}px" title="${title}"></span>`;
  }).join('');
}
function shortSessionKey(key){
  if (!key) return 'n/a';
  return key.length > 72 ? `${key.slice(0,72)}…` : key;
}
function renderUsageList(items, kind){
  if (!items || !items.length) return '<li>暂无</li>';
  return items.map(item => {
    if (kind === 'models') {
      return `<li><span class="mono">${esc(item.provider || 'unknown')}/${esc(item.model || 'unknown')}</span> · ${fmtNum(item.total_tokens)} · ${item.share_pct}%</li>`;
    }
    return `<li><span class="mono">${esc(shortSessionKey(item.key))}</span> · ${fmtNum(item.total_tokens)} · ${item.share_pct}%</li>`;
  }).join('');
}
function createCard(a){
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.agentId = a.agent_id;
  card.innerHTML = `
    <div class="row">
      <div>
        <div class="agent-title" style="font-size:20px;font-weight:800"></div>
        <div class="mono agent-id"></div>
      </div>
      <span class="pill agent-status"></span>
    </div>
    <div class="focus-box">
      <div class="focus-title">现在在干什么</div>
      <div class="focus-main now-doing"></div>
      <div class="focus-sub updated-brief"></div>
    </div>
    <div class="focus-box why-box">
      <div class="focus-title">如果没在干活，为什么</div>
      <div class="focus-main why-not-working"></div>
    </div>
    <div class="focus-box">
      <div class="focus-title">怎么让它开始干活</div>
      <div class="focus-main how-to-start"></div>
    </div>
    <details class="advanced">
      <summary>展开详情</summary>
      <div class="section"><span class="label">群：</span><span class="binding-name"></span><div class="mono binding-id"></div></div>
      <div class="section"><span class="label">当前任务：</span><span class="task-text"></span></div>
      <div class="section"><span class="label">步骤：</span><span class="step-text"></span></div>
      <div class="section"><span class="label">结果：</span><span class="result-text"></span></div>
      <div class="section"><span class="label">阻塞：</span><span class="blocker-text"></span></div>
      <div class="section"><span class="label">下一步：</span><span class="next-text"></span></div>
      <div class="section"><span class="label">最近更新：</span><span class="updated-text"></span></div>
      <div class="token-box">
        <div class="row"><span class="label">Tokens</span><span class="live-state"></span></div>
        <div class="mono activity-note"></div>
        <div class="token-grid">
          <div>总量：<span class="mono token-total"></span></div>
          <div>+5s：<span class="mono token-delta"></span></div>
          <div>+1m：<span class="mono token-delta-1m"></span></div>
          <div>连续活跃：<span class="mono token-streak"></span></div>
          <div>输入：<span class="mono token-input"></span></div>
          <div>输出：<span class="mono token-output"></span></div>
          <div>缓存读：<span class="mono token-cache"></span></div>
          <div>采样窗口：<span class="mono token-window"></span></div>
        </div>
        <div class="pulse-box">
          <div class="chart-head"><span class="label">实时脉冲</span><span class="mono pulse-summary"></span></div>
          <div class="pulse-strip"></div>
          <div class="mono chart-note">直接使用当前页面每 5 秒轮询到的 gateway tokens；每格代表 5 秒。</div>
        </div>
        <div class="chart-box">
          <div class="chart-head"><span class="label">历史消耗曲线</span><div class="range-switch">${rangeButtons(a.agent_id)}</div></div>
          <div class="mono chart-note">按落盘历史显示前一采样窗口内新增的 tokens；秒级变化看上方实时脉冲。</div>
          <svg class="spark"></svg>
        </div>
        <div class="usage-box">
          <div class="chart-head"><span class="label">今日 Usage 汇总</span><span class="mono usage-date"></span></div>
          <div class="usage-grid">
            <div>今日总量：<span class="mono usage-total"></span></div>
            <div>会话数：<span class="mono usage-sessions"></span></div>
            <div>输入：<span class="mono usage-input"></span></div>
            <div>输出：<span class="mono usage-output"></span></div>
            <div>缓存读：<span class="mono usage-cache-read"></span></div>
            <div>缓存写：<span class="mono usage-cache-write"></span></div>
          </div>
          <div class="section"><span class="label">模型分布：</span><ul class="usage-list usage-models"></ul></div>
          <div class="section"><span class="label">Session 分摊：</span><ul class="usage-list usage-split"></ul></div>
        </div>
      </div>
      <div class="section"><span class="label">最近会话：</span><div class="mono session-key"></div></div>
      <div class="section artifact-wrap"><span class="label">最近产物：</span><div class="artifact-name"></div><div class="mono artifact-path"></div></div>
      <div class="section"><span class="label">Workspace：</span><div class="mono workspace-path"></div></div>
    </details>
  `;
  return card;
}
function plain(v){
  if (v === undefined || v === null) return '';
  const s = String(v).trim();
  return s === 'n/a' ? '' : s;
}
function isWorkingNow(a, rt){
  return !!(rt && rt.isWorking);
}
function isCronDriven(a){
  const keys = [a.latest_session_key, a.token_session_key].filter(Boolean).join(' ');
  return keys.includes(':cron:');
}
function inferWhyNotWorking(a, rt){
  const blocker = plain(a.blocker);
  if (a.status === 'blocked' && blocker) return blocker;
  if (rt?.stateKey === 'stuck') return rt.detail;
  if (rt?.stateKey === 'pending') return rt.detail;
  if (a.status === 'running' && !isWorkingNow(a, rt) && isCronDriven(a)) return '当前不是持续计算态；上一轮已结束，正在等下一轮定时触发。';
  if (a.status === 'idle' && isCronDriven(a)) return '当前空闲，正在等待下一轮定时触发。';
  if (a.status === 'idle') return '当前没有新的输入或触发。';
  if (a.status === 'stale' && !a.binding) return '最近没有新活动，而且还没有可直接唤起它的群/渠道。';
  if (a.status === 'stale') return '最近没有新的会话活动或 token 增长。';
  if (!isWorkingNow(a, rt)) return '当前 token 没有增长。';
  return '';
}
function inferHowToStart(a, rt){
  const blocker = plain(a.blocker);
  const groupName = a.binding?.chat_name ? `去「${a.binding.chat_name}」里直接发一条明确指令` : '';
  if (/(needs:youyuan|待游渊确认|体感确认|需人工排查|确认|补输入)/.test(blocker)) {
    return '先补你这边的确认/输入，再继续推进。';
  }
  if (a.status === 'blocked') {
    return groupName ? `${groupName}，并先解除当前阻塞。` : '先解除当前阻塞，再手动触发。';
  }
  if (a.status === 'idle' || a.status === 'stale' || (a.status === 'running' && !isWorkingNow(a, rt))) {
    if (groupName && isCronDriven(a)) return `${groupName}，或者等下一轮定时触发。`;
    if (groupName) return groupName;
    if (isCronDriven(a)) return '等待下一轮定时触发，或手动触发对应 cron。';
    return '给它一个明确输入，或补上绑定/触发入口。';
  }
  return '不用催，它现在就在推进。';
}
function summarizeDoing(a, rt){
  const parts = [plain(a.task), plain(a.step)].filter(Boolean);
  if (parts.length) {
    if (isWorkingNow(a, rt)) return parts.join(' · ');
    if (a.status === 'running' && !isWorkingNow(a, rt) && isCronDriven(a)) return `${parts[0]}（最近一轮刚结束，下一轮前待机）`;
    return parts.join(' · ');
  }
  return isWorkingNow(a, rt) ? '正在处理当前会话' : '暂无明确任务';
}
function updateCard(card, a){
  const statusClass = ['active','idle','stale','blocked','running','done'].includes(a.status)?a.status:'idle';
  const t = a.tokens || {};
  const rt = realtimeFeedback(a);
  const u = usageSummaryData[a.agent_id] || null;
  const prev = previous.get(a.agent_id) || {};
  const changed = rt.currentDelta > 0 || (t.total || 0) !== (prev.total || 0);
  card.querySelector('.agent-title').textContent = `${a.emoji || ''} ${a.name}`.trim();
  card.querySelector('.agent-id').textContent = a.agent_id;
  const statusEl = card.querySelector('.agent-status');
  statusEl.className = `pill agent-status ${statusClass}`;
  statusEl.textContent = a.status;
  card.querySelector('.binding-name').textContent = a.binding ? a.binding.chat_name : '未绑定';
  card.querySelector('.binding-id').textContent = a.binding ? a.binding.chat_id : '';
  card.querySelector('.task-text').textContent = asText(a.task);
  card.querySelector('.step-text').textContent = asText(a.step);
  card.querySelector('.result-text').textContent = asText(a.result);
  card.querySelector('.blocker-text').textContent = asText(a.blocker || '无');
  card.querySelector('.next-text').textContent = asText(a.next_action);
  card.querySelector('.updated-text').textContent = fmt(a.last_updated_ms);
  card.querySelector('.now-doing').textContent = summarizeDoing(a, rt);
  card.querySelector('.updated-brief').textContent = `状态：${a.status} · ${rt.label} · 最近更新：${fmt(a.last_updated_ms || a.latest_session?.updatedAt)}`;
  const why = inferWhyNotWorking(a, rt);
  const whyBox = card.querySelector('.why-box');
  if (isWorkingNow(a, rt)) {
    whyBox.style.display = 'none';
  } else {
    whyBox.style.display = '';
    card.querySelector('.why-not-working').textContent = why || '当前没有明显阻塞，但也没有实际工作信号。';
  }
  card.querySelector('.how-to-start').textContent = inferHowToStart(a, rt);
  const tokenBox = card.querySelector('.token-box');
  tokenBox.classList.toggle('hot', changed);
  const liveState = card.querySelector('.live-state');
  liveState.className = `live-state state-${rt.stateKey}`;
  liveState.textContent = rt.label;
  card.querySelector('.activity-note').textContent = rt.detail;
  const tokenFields = [
    ['.token-total', fmtNum(t.total ?? 0)],
    ['.token-delta', signedNum(rt.currentDelta)],
    ['.token-delta-1m', signedNum(rt.sum1m)],
    ['.token-streak', fmtDuration(rt.streakMs)],
    ['.token-input', fmtNum(t.input ?? 0)],
    ['.token-output', fmtNum(t.output ?? 0)],
    ['.token-cache', fmtNum(t.cache_read ?? 0)],
    ['.token-window', `${REFRESH_MS / 1000}s 页面 / 1m 历史`],
  ];
  for (const [sel, value] of tokenFields){
    const el = card.querySelector(sel);
    el.textContent = value;
    el.classList.toggle('bump', changed && sel !== '.token-window');
  }
  renderPulse(card.querySelector('.pulse-strip'), rt.samples);
  card.querySelector('.pulse-summary').textContent = `最近 1m ${signedNum(rt.sum1m)}`;
  const points = mergedPoints(a.agent_id);
  drawChart(card.querySelector('.spark'), points);
  card.querySelectorAll('.range-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.range === selectedRange));
  card.querySelector('.usage-date').textContent = u ? `${u.start_date}${u.end_date && u.end_date !== u.start_date ? ` → ${u.end_date}` : ''}` : '今日';
  card.querySelector('.usage-total').textContent = u ? fmtNum(u.total_tokens) : 'n/a';
  card.querySelector('.usage-sessions').textContent = u ? fmtNum(u.session_count) : 'n/a';
  card.querySelector('.usage-input').textContent = u ? fmtNum(u.input) : 'n/a';
  card.querySelector('.usage-output').textContent = u ? fmtNum(u.output) : 'n/a';
  card.querySelector('.usage-cache-read').textContent = u ? fmtNum(u.cache_read) : 'n/a';
  card.querySelector('.usage-cache-write').textContent = u ? fmtNum(u.cache_write) : 'n/a';
  card.querySelector('.usage-models').innerHTML = renderUsageList(u?.models, 'models');
  card.querySelector('.usage-split').innerHTML = renderUsageList(u?.top_sessions, 'sessions');
  card.querySelector('.session-key').textContent = asText(a.latest_session_key);
  const hasArtifact = !!a.latest_artifact;
  card.querySelector('.artifact-wrap').style.display = hasArtifact ? '' : 'none';
  if (hasArtifact){
    card.querySelector('.artifact-name').textContent = a.latest_artifact.name;
    card.querySelector('.artifact-path').textContent = a.latest_artifact.path;
  }
  card.querySelector('.workspace-path').textContent = a.workspace;
  previous.set(a.agent_id, { total: t.total || 0 });
}
async function load(){
  const res = await fetch('/api/overview');
  const data = await res.json();
  document.getElementById('meta').innerHTML = `更新时间：${fmt(data.generated_at)} · Tailscale: ${data.tailscale_ip||'n/a'} · 地址：${data.tailscale_ip?`<a href="http://${data.tailscale_ip}:8091" target="_blank">http://${data.tailscale_ip}:8091</a>`:'n/a'}`;
  const grid = document.getElementById('grid');
  const seen = new Set();
  for (const a of data.agents){
    let card = cardMap.get(a.agent_id);
    if (!card){
      card = createCard(a);
      cardMap.set(a.agent_id, card);
      grid.appendChild(card);
    }
    updateCard(card, a);
    seen.add(a.agent_id);
  }
  for (const [agentId, card] of [...cardMap.entries()]){
    if (!seen.has(agentId)){
      card.remove();
      cardMap.delete(agentId);
    }
  }
  lastLoadAt = performance.now();
}
function tick(){
  const elapsed = performance.now() - lastLoadAt;
  const remain = Math.max(0, REFRESH_MS - elapsed);
  const pct = Math.min(100, (elapsed / REFRESH_MS) * 100);
  const fill = document.getElementById('refreshFill');
  const countdown = document.getElementById('countdown');
  if(fill) fill.style.width = `${pct}%`;
  if(countdown) countdown.textContent = `下次刷新 ${(remain/1000).toFixed(1)}s`;
}
document.getElementById('grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  selectedRange = btn.dataset.range;
  await loadHistory();
  await load();
});
(async function init(){
  await loadHistory();
  await loadUsageSummary();
  await load();
  setInterval(load, REFRESH_MS);
  setInterval(loadHistory, HISTORY_REFRESH_MS);
  setInterval(loadUsageSummary, HISTORY_REFRESH_MS);
  setInterval(tick, 100);
})();
</script>
</body>
</html>
